version: '3.8'

networks:
  default:
    external: true
    name: future-devs
services:
  app:
    hostname: nfz-queue-simulator
    container_name: nfz-queue-simulator
    volumes:
      - ../../:/workspaces
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    labels:
      - traefik.enable=true
      - subdomain=sas
