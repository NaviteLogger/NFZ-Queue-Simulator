<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Queue Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #007bff;
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        form {
            display: none;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        form.active {
            display: block;
        }

        form div {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
        }

        input,
        select,
        button {
            padding: 8px;
            font-size: 14px;
            width: calc(100% - 160px);
            max-width: 400px;
            box-sizing: border-box;
            margin-left: 10px;
            border-radius: 8px;
        }

        button {
            width: auto;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        .menu {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .menu button {
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .menu button:hover {
            background-color: #0056b3;
        }

        .menu button.active {
            background-color: #0056b3;
            cursor: default;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .error {
            font-size: 15px;
            text-align: center;
            background-color: #f44336;
            color: white;
            border-radius: 8px;
        }

        .success {
            font-size: 15px;
            text-align: center;
            background-color: #4caf50;
            color: white;
            border-radius: 8px;
        }

        .queue-container {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .queue-container h2 {
            border: none;
        }

        .queue-container button {
            display: block;
            margin: 20px auto 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Patient Queue Management</h1>


        <!-- Menu -->
        <div class="menu">
            <button id="addMenuButton" class="active" onclick="showForm('addPatientForm')">Add New Patient</button>
            <button id="insertMenuButton" onclick="showForm('insertPatientForm')">Insert Patient</button>
        </div>
        <div id="alerts"></div>
        <!-- Add New Patient Form -->
        <form id="addPatientForm" class="active">
            <h2>Add New Patient</h2>
            <div>
                <label for="name">Imię:</label>
                <input type="text" id="name" required>
            </div>
            <div>
                <label for="surname">Nazwisko:</label>
                <input type="text" id="surname" required>
            </div>
            <div>
                <label for="age">Wiek:</label>
                <input type="number" id="age" required min="1">
            </div>
            <div>
                <label for="pesel">PESEL:</label>
                <input type="text" id="pesel" required>
            </div>
            <div>
                <label for="gender">Płeć:</label>
                <select id="gender" required>
                    <option value="Kobieta">Kobieta</option>
                    <option value="Mężczyzna">Mężczyzna</option>
                </select>
            </div>
            <div>
                <label for="time_of_visit">Godzina wizyty:</label>
                <input type="time" id="time_of_visit" required>
            </div>
            <button type="submit">Add Patient</button>
        </form>
        <div>
            <button id="randomPatientDatae">Random Patient Data</button>
        </div>

        <!-- Insert Patient Form -->
        <form id="insertPatientForm">
            <h2>Insert Patient at Specific Position</h2>
            <div>
                <label for="insert_name">Imię:</label>
                <input type="text" id="insert_name" required>
            </div>
            <div>
                <label for="insert_surname">Nazwisko:</label>
                <input type="text" id="insert_surname" required>
            </div>
            <div>
                <label for="insert_age">Wiek:</label>
                <input type="number" id="insert_age" required min="1">
            </div>
            <div>
                <label for="insert_pesel">PESEL:</label>
                <input type="text" id="insert_pesel" required>
            </div>
            <div>
                <label for="insert_gender">Płeć:</label>
                <select id="insert_gender" required>
                    <option value="Kobieta">Kobieta</option>
                    <option value="Mężczyzna">Mężczyzna</option>
                </select>
            </div>
            <div>
                <label for="insert_position">Pozycja:</label>
                <input type="number" id="insert_position" min="0" required>
            </div>
            <button type="submit">Insert Patient</button>
        </form>

        <!-- Patient Queue -->
        <div class="queue-container">
            <h2>Patient Queue</h2>
            <ul id="patientQueue"></ul>
            <button id="removePatient">Remove Next Patient</button>
        </div>
    </div>

    <script>
        function showForm(formId) {
            // Ukryj wszystkie formularze
            document.querySelectorAll("form").forEach(form => form.classList.remove("active"));

            // Pokaż wybrany formularz
            document.getElementById(formId).classList.add("active");

            // Deaktywuj wszystkie przyciski w menu
            document.querySelectorAll(".menu button").forEach(button => button.classList.remove("active"));

            // Aktywuj odpowiedni przycisk w menu
            if (formId === "addPatientForm") {
                document.getElementById("addMenuButton").classList.add("active");
            } else if (formId === "insertPatientForm") {
                document.getElementById("insertMenuButton").classList.add("active");
            }
        }
        const alerts = document.getElementById("alerts");
        const patientQueue = document.getElementById("patientQueue");

        // Display an alert
        function showAlert(message, type) {
            alerts.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => alerts.innerHTML = "", 3000);
        }

        // Fetch and display patients with their index
        async function fetchPatients() {
            const response = await fetch('/api/patients');
            const patients = await response.json();
            patientQueue.innerHTML = patients.map(patient => `
                <li>
                    <strong>${patient.index + 1}. ${patient.name} ${patient.surname}</strong><br>
                    Age: ${patient.age}, PESEL: ${patient.pesel}<br>
                    Gender: ${patient.gender}, Time: ${patient.time_of_visit}
                </li>
            `).join('');
        }

        // Random patient data
        document.getElementById("randomPatientDatae").addEventListener("click", async () => {
            const response = await fetch('/api/random-patient');
            const data = await response.json();
            const patient = data;
            document.getElementById("name").value = patient.name;
            document.getElementById("surname").value = patient.surname;
            document.getElementById("age").value = patient.age;
            document.getElementById("gender").value = patient.gender;
            document.getElementById("pesel").value = patient.pesel;
            document.getElementById("time_of_visit").value = patient.time_of_visit;
        });

        // Add a new patient
        document.getElementById("addPatientForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById("name").value,
                surname: document.getElementById("surname").value,
                age: document.getElementById("age").value,
                pesel: document.getElementById("pesel").value,
                gender: document.getElementById("gender").value,
                time_of_visit: document.getElementById("time_of_visit").value,
            };
            const response = await fetch("/api/patient", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData),
            });
            const result = await response.json();
            if (response.ok) {
                showAlert(result.message, "success");
                fetchPatients();
            } else {
                showAlert(result.error, "error");
            }
        });

        // Add a new patient
        document.getElementById("insertPatientForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            // Check the length of the queue
            const lengthResponse = await fetch('/api/queue/length');
            const lengthResult = await lengthResponse.json();

            if (document.getElementById("insert_position").value > lengthResult.length + 1) {
                document.getElementById("insert_position").value = lengthResult.length + 1;
            }

            const formData = {
                name: document.getElementById("insert_name").value,
                surname: document.getElementById("insert_surname").value,
                age: document.getElementById("insert_age").value,
                pesel: document.getElementById("insert_pesel").value,
                gender: document.getElementById("insert_gender").value,
                position: document.getElementById("insert_position").value,
            };
            const response = await fetch('/api/patient/insert', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData),
            });
            const result = await response.json();
            if (response.ok) {
                showAlert(result.message, "success");
                fetchPatients(); // Refresh queue
            } else {
                showAlert(result.error, "error");
            }
        });

        // Remove the next patient
        document.getElementById("removePatient").addEventListener("click", async () => {
            const response = await fetch('/api/patient', { method: 'DELETE' });
            const result = await response.json();
            if (response.ok) {
                showAlert(result.message, "success");
                fetchPatients();
            } else {
                showAlert(result.error, "error");
            }
        });

        // Initial fetch
        fetchPatients();
    </script>
</body>

</html>
